services:
  postgres:
    image: postgres:16-alpine
    container_name: triforge-postgres
    environment:
      POSTGRES_DB: triforge
      POSTGRES_USER: triforge
      POSTGRES_PASSWORD: triforge
    ports:
      - "5432:5432"
    volumes:
      - triforge-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triforge -d triforge"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres-vector:
    image: pgvector/pgvector:pg16
    container_name: triforge-postgres-vector
    profiles:
      - vector
    environment:
      POSTGRES_DB: triforge
      POSTGRES_USER: triforge
      POSTGRES_PASSWORD: triforge
    ports:
      - "5433:5432"
    volumes:
      - triforge-postgres-vector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triforge -d triforge"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  triforge-postgres-data:
  triforge-postgres-vector-data:
